<script>
(async function(){
  const list = document.getElementById('list');
  const cnt  = document.getElementById('cnt');
  const q    = document.getElementById('q');

  const res = await fetch('/sitemap.xml').catch(()=>null);
  if(!res || !res.ok){ list.innerHTML = '<p class="muted">Failed to load sitemap.xml</p>'; return; }

  const xml  = new DOMParser().parseFromString(await res.text(),'application/xml');
  const nodes= [...xml.querySelectorAll('url')].map(u => ({
    loc: u.querySelector('loc')?.textContent?.trim() || '',
    lastmod: u.querySelector('lastmod')?.textContent?.substring(0,10) || ''
  }));

  const items = nodes
    .map(o => { try{ const u=new URL(o.loc); return { path:u.pathname, lastmod:o.lastmod }; } catch { return null; }})
    .filter(Boolean)
    .filter(o => o.path.startsWith('/en-gb/blog/') && o.path !== '/en-gb/blog/')
    .map(o => {
      const slug = o.path.split('/').pop().replace('.html','');
      return {
        path:o.path,
        title: slug.replace(/-/g,' ').replace(/\b\w/g,s=>s.toUpperCase()),
        lastmod:o.lastmod
      };
    })
    .sort((a,b)=>a.title.localeCompare(b.title));

  function draw(rows){
    list.innerHTML = rows.map(r => `
      <article class="card">
        <a href="${r.path}">${r.title}</a>
        <div class="meta"><span class="badge">UK</span>${r.lastmod?`<span>Updated: ${r.lastmod}</span>`:''}</div>
      </article>`).join('');
    cnt.textContent = rows.length;
  }
  draw(items);

  q.addEventListener('input', () => {
    const v=q.value.toLowerCase().trim();
    draw(v?items.filter(it=>it.title.toLowerCase().includes(v)):items);
  });
})();
</script>
