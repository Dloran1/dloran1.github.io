<!-- scripts -->
<script src="/assets/js/consent.js"></script>

<script src="/assets/js/langswitch.js"></script>
<script>
(function(){
  const ROOT = location.origin;
  const PREFIX = ROOT + "/en-gb/blog/";
  const SITEMAP = ROOT + "/sitemap.xml";

  // Fallback список UK (47 слугов) — когда sitemap ещё не видит файлы
  const FALLBACK = [
    "what-is-vpn-uk.html","free-vs-paid-vpn-uk.html","free-vpn-uk.html",
    "why-vpn-2025-uk.html","which-vpn-server-uk.html",
    "vpn-myths-uk.html","no-logs-uk.html","nordvpn-vs-surfshark-uk.html",
    "player-tvp-—-skip.html", /* если такого нет — не будет найден, ок */
    "vpn-speed-test-uk.html","vpn-bbc-iplayer-uk.html",
    "vpn-2fa-mfa-uk.html","is-vpn-legal-uk.html","vpn-android-uk.html",
    "vpn-online-banking-uk.html","dedicated-ip-vpn-uk.html","vpn-apple-tv-uk.html",
    "vpn-remote-work-uk.html","vpn-gaming-uk.html","vpn-ps5-xbox-uk.html",
    "vpn-smart-tv-uk.html","vpn-ip-dns-leaks-uk.html","double-vpn-uk.html",
    "vpn-geo-blocking-uk.html","vpn-geo-location-uk.html","vpn-ios-uk.html",
    "vpn-kill-switch-uk.html","vpn-linux-uk.html","vpn-mac-uk.html",
    "vpn-netflix-uk.html","vpn-best-settings-uk.html","vpn-torrenting-uk.html",
    "vpn-port-forwarding-uk.html","vpn-remote-work-uk.html","proxy-vs-vpn-uk.html",
    "vpn-public-wifi-uk.html","vpn-split-tunneling-uk.html",
    "vpn-speed-test-uk.html","vpn-travel-uk.html","vpn-windows-uk.html",
    "vpn-disadvantages-uk.html","vpn-security-uk.html","vpn-sky-go-uk.html",
    "vpn-streaming-uk.html","vpn-student-uk.html","vpn-on-router-uk.html",
    "vpn-router-setup-uk.html","vpn-protocols-uk.html","best-vpn-uk.html"
  ].map(slug => PREFIX + slug);

  const list = document.getElementById('list');
  const count = document.getElementById('count');
  const q = document.getElementById('q');

  const tidy = t => t.replace(/\s+\|\s+.*$/, '');
  const card = (u,title,lastmod) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.title = title.toLowerCase();
    div.innerHTML = `
      <h2 style="margin:.2rem 0 .35rem 0;"><a href="${u}">${title}</a></h2>
      <p class="muted">Updated: ${lastmod || '—'}</p>
    `;
    return div;
  };

  function render(items){
    list.innerHTML = '';
    items.forEach(it => list.appendChild(card(it.url, it.title, it.lastmod)));
    count.textContent = items.length;
  }

  async function fetchTitle(url){
    try{
      const r = await fetch(url, {mode:'same-origin'});
      const h = await r.text();
      const doc = new DOMParser().parseFromString(h, 'text/html');
      const t = (doc.querySelector('title')?.textContent || doc.querySelector('h1')?.textContent || url);
      return tidy(t.trim());
    }catch(e){ return url.split('/').pop().replace(/-/g,' ').replace('.html',''); }
  }

  async function build(){
    try{
      const x = await fetch(SITEMAP);
      const xml = await x.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const urls = [...doc.querySelectorAll('urlset > url')].map(n => ({
        loc: n.querySelector('loc')?.textContent || '',
        lastmod: n.querySelector('lastmod')?.textContent || ''
      }));
      let uk = urls.filter(u => u.loc.startsWith(PREFIX) && !u.loc.endsWith('/index.html'));
      if(uk.length === 0){ uk = FALLBACK.map(u => ({loc:u,lastmod:''})); }

      const items = [];
      for(const u of uk){
        const title = await fetchTitle(u.loc);
        items.push({url:u.loc, title, lastmod:u.lastmod});
      }
      items.sort((a,b)=>(b.lastmod||'').localeCompare(a.lastmod||''));
      render(items);

      q.addEventListener('input', () => {
        const v = q.value.trim().toLowerCase();
        [...list.children].forEach(el => {
          el.style.display = el.dataset.title.includes(v) ? '' : 'none';
        });
      });
    }catch(e){
      const items = await Promise.all(FALLBACK.map(async u => ({url:u, title: await fetchTitle(u), lastmod:''})));
      render(items);
    }
  }

  build();
})();
</script>
</body>
