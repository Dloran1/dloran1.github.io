<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — all articles (UK)</title>
  <meta name="description" content="All UK guides in one place — setup, streaming, speed & privacy.">
  <link rel="canonical" href="/en-gb/blog/index.html">
  <link rel="alternate" hreflang="pl" href="/blog/index.html">
  <link rel="alternate" hreflang="en-gb" href="/en-gb/blog/index.html">
  <style>
    :root{color-scheme:dark light}
    body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:#0c1220;color:#cfe3ff}
    a{color:#59a8ff;text-decoration:none}
    .wrap{max-width:880px;margin:0 auto;padding:24px 16px 80px}
    h1{font-size:clamp(28px,5vw,40px);margin:8px 0 8px}
    .muted{opacity:.8}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 18px}
    .pill{display:inline-block;padding:2px 10px;border-radius:10px;background:#1a2340;color:#9cc2ff;font-weight:700}
    .lang a{margin-right:10px}
    .card{background:#111a33;border:1px solid #1e2b57;border-radius:12px;padding:16px 18px;margin:12px 0}
    .title{font-weight:800;font-size:20px;margin:0 0 6px}
    .small{font-size:13px;opacity:.75}
    input[type="search"]{flex:1;min-width:220px;background:#0f1730;border:1px solid #23315f;border-radius:10px;color:#cfe3ff;padding:10px 12px}
    footer{margin-top:28px;font-size:14px;opacity:.9}
    .grid{margin-top:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="small muted"><a href="/en-gb/">Home</a> › <b>Blog (UK)</b></nav>
    <h1>Blog — all articles (UK) <span class="pill" id="count">0</span></h1>
    <p class="muted">All UK guides in one place — setup, streaming, speed &amp; privacy.</p>

    <div class="row lang">
      <a href="/en-gb/blog/index.html" aria-current="page">English (UK)</a> | 
      <a href="/blog/index.html">Polski (PL)</a>
    </div>

    <div class="row">
      <label class="small muted" for="q">Search titles…</label>
      <input id="q" type="search" placeholder="Search titles…">
    </div>

    <div id="list" class="grid" aria-live="polite"></div>

    <footer class="small">
      © 2025 VPN World ·
      <a href="/en-gb/privacy.html">Privacy Policy (EN)</a> ·
      <a href="/privacy.html">Polityka prywatności (PL)</a>
    </footer>
  </div>

<script>
(async function(){
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const qEl = document.getElementById('q');

  // Берём URL’ы из sitemap.xml
  const sm = await fetch('/sitemap.xml', {cache:'no-store'}).then(r=>r.text());
  const urls = [...sm.matchAll(/<loc>(.*?)<\/loc>/g)].map(m=>m[1]);

  // UK: только /en-gb/blog/*.html и не index.html
  let items = urls
    .filter(u => u.includes('/en-gb/blog/') && u.endsWith('.html'))
    .filter(u => !/\/en-gb\/blog\/index\.html$/i.test(u));

  // Известные 404 (пока не созданы) — скрываем из списка, чтобы не «ломали» счётчик
  const missing = new Set([
    '/en-gb/blog/is-vpn-legal-uk.html',
    '/en-gb/blog/dedicated-ip-vpn-uk.html',
    '/en-gb/blog/free-vpn-uk.html',
    '/en-gb/blog/proxy-vs-vpn-uk.html',
    '/en-gb/blog/vpn-geo-blocking-uk.html',
    '/en-gb/blog/vpn-geo-location-uk.html',
    '/en-gb/blog/no-logs-uk.html',
    '/en-gb/blog/vpn-advantages-uk.html',
    '/en-gb/blog/nordvpn-vs-surfshark-uk.html',
    '/en-gb/blog/double-vpn-uk.html',
    '/en-gb/blog/vpn-kill-switch-uk.html'
  ]);
  items = items.filter(u => !missing.has(new URL(u, location.origin).pathname));

  // Приводим в локальные пути для GitHub Pages
  items = items.map(u => new URL(u, location.origin).pathname);

  // Рендер
  const render = (rows) => {
    listEl.innerHTML = '';
    rows.forEach(path => {
      const name = decodeURIComponent(path.split('/').pop().replace('.html',''))
        .replace(/-/g,' ').replace(/\b\w/g, s=>s.toUpperCase());
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <a class="title" href="${path}">${name}</a>
        <div class="small muted">Updated: —</div>
      `;
      listEl.appendChild(card);
    });
    countEl.textContent = rows.length.toString();
  };

  render(items);

  // Поиск по заголовкам
  qEl.addEventListener('input', (e)=>{
    const v = e.target.value.trim().toLowerCase();
    const filtered = v ? items.filter(p => p.toLowerCase().includes(v)) : items;
    render(filtered);
  });
})();
</script>
</body>
</html>
