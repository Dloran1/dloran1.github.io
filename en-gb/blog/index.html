<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — all articles (UK)</title>
  <meta name="description" content="All UK guides in one place — setup, streaming, speed & privacy.">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="en-gb" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <main class="container">
    <nav class="breadcrumbs">
      <a href="/">Home</a> › <span>Blog (UK)</span>
    </nav>

    <h1>Blog — all articles (UK) <span id="count"></span></h1>
    <p>All UK guides in one place — setup, streaming, speed & privacy.</p>

    <div class="lang-switch">
      <a href="/en-gb/blog/index.html">English (UK)</a> | <a href="/blog/index.html">Polski (PL)</a>
    </div>

    <input type="text" id="search" placeholder="Search titles...">
    <div id="articles"></div>
  </main>

  <footer class="footer">
    <p>© 2025 VPN World · <a href="/privacy-policy-en.html">Privacy Policy (EN)</a> | <a href="/privacy-policy-pl.html">Polityka prywatności (PL)</a></p>
  </footer>

  <script>
    async function loadSitemap() {
      const res = await fetch('/sitemap.xml');
      const xml = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'application/xml');
      const urls = [...doc.querySelectorAll('url')].map(u => ({
        loc: u.querySelector('loc').textContent,
        lastmod: u.querySelector('lastmod')?.textContent || ''
      }));

      // Фильтр только UK
      const entries = urls
        .filter(e => e.loc.includes('/en-gb/blog/'))
        .filter(e => !e.loc.endsWith('/en-gb/blog/index.html'));

      render(entries);
    }

    function render(entries) {
      const container = document.getElementById('articles');
      const search = document.getElementById('search');
      const count = document.getElementById('count');
      count.textContent = entries.length;

      function display(list) {
        container.innerHTML = '';
        list.forEach(e => {
          const div = document.createElement('div');
          div.className = 'post-card';
          div.innerHTML = `
            <a href="${e.loc}">${decodeURIComponent(e.loc.split('/').pop().replace('.html','').replace(/-/g,' '))}</a>
            <div class="meta">Updated: ${e.lastmod || '—'}</div>`;
          container.appendChild(div);
        });
      }

      display(entries);

      search.addEventListener('input', () => {
        const q = search.value.toLowerCase();
        display(entries.filter(e => e.loc.toLowerCase().includes(q)));
      });
    }

    loadSitemap();
  </script>
</body>
</html>
