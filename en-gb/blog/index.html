<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — all articles (UK)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="All UK VPN World guides in one place — setup, streaming, speed & privacy.">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
</head>
<body>
<nav class="breadcrumbs"><a href="/en-gb/">Home</a> › <span>Blog (UK)</span></nav>

<header>
  <h1>Blog — all articles (UK) <span id="count" class="badge">0</span></h1>
  <p>All UK guides in one place — setup, streaming, speed &amp; privacy.</p>
  <p><a href="/en-gb/blog/index.html">English (UK)</a> | <a href="/blog/index.html">Polski (PL)</a></p>
</header>

<label for="q" class="sr-only">Search titles…</label>
<input id="q" type="search" placeholder="Search titles…" aria-label="Search titles…"/>

<ul id="list" class="blog-list" aria-live="polite"></ul>

<footer class="foot">
  <p>© 2025 VPN World · <a href="/en-gb/privacy.html">Privacy Policy (EN)</a> · <a href="/privacy.html">Polityka prywatności (PL)</a></p>
</footer>

<script>
(async function(){
  const q = document.getElementById('q');
  const list = document.getElementById('list');
  const count = document.getElementById('count');

  async function loadSitemap() {
    const res = await fetch('/sitemap.xml', {cache:'no-store'});
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    const urls = [...xml.querySelectorAll('urlset > url')].map(u => ({
      loc: u.querySelector('loc')?.textContent?.trim() || '',
      lastmod: u.querySelector('lastmod')?.textContent?.trim() || ''
    }));
    // только UK
    return urls.filter(u => /^https?:\/\/[^/]+\/en-gb\/blog\/.+\.html$/i.test(u.loc));
  }

  function niceTitleFromSlug(slug){
    // slug -> human title
    return slug.replace(/[-_/]+/g,' ')
               .replace(/\b\w/g, m => m.toUpperCase());
  }

  function render(items){
    list.innerHTML = '';
    items.forEach(it=>{
      const url = it.loc;
      const slug = url.split('/').pop().replace('.html','');
      const title = niceTitleFromSlug(slug);
      const li = document.createElement('li');
      li.className = 'blog-card';
      li.innerHTML = `<a href="${url}">${title}</a>
                      <div class="meta">Updated: ${it.lastmod || '—'}</div>`;
      list.appendChild(li);
    });
    count.textContent = String(items.length);
  }

  const all = await loadSitemap();
  render(all);

  q.addEventListener('input', () => {
    const term = q.value.trim().toLowerCase();
    const filt = !term ? all : all.filter(i => i.loc.toLowerCase().includes(term));
    render(filt);
  });
})();
</script>
</body>
</html>
