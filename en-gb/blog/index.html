<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — VPN World (UK)</title>
  <meta name="description" content="All UK blog articles: setup guides, streaming playbooks, speed & privacy tips.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/">

  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
  <style>
    .wrap{max-width:980px;margin:0 auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:14px;background:rgba(255,255,255,.03)}
    .card a{color:#2E90FA;text-decoration:none}
    .card a:hover{text-decoration:underline}
    .muted{opacity:.85}
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 18px}
    .filters input{flex:1;min-width:220px;padding:10px;border-radius:10px;border:1px solid rgba(140,140,160,.35);background:rgba(255,255,255,.04);color:inherit}
    .badge{display:inline-block;padding:.2rem .5rem;border:1px solid rgba(140,140,160,.35);border-radius:6px;font-size:.8rem;margin-left:6px}
    .lang-switch{margin:8px 0 16px}
    .lang-switch a{color:#2E90FA;text-decoration:none;margin-right:8px}
    .lang-switch a:hover{text-decoration:underline}
    .empty{border:1px dashed rgba(140,140,160,.35);border-radius:12px;padding:18px;text-align:center}
  </style>
</head>
<body>
<nav class="wrap" aria-label="Breadcrumb">
  <p><a href="/en-gb/">Home</a> › <strong>Blog</strong></p>
</nav>

<header class="wrap">
  <h1>Blog (UK)</h1>
  <p class="muted">All UK guides in one place — setup, streaming, speed & privacy. <span class="badge" id="badgeCount">Loading…</span></p>

  <!-- видимый переключатель языков -->
  <nav class="lang-switch" aria-label="Language switch">
    <a href="/en-gb/blog/" lang="en-GB">English (UK)</a> |
    <a href="/blog/" lang="pl-PL">Polski</a>
  </nav>

  <div class="filters">
    <input id="q" type="search" placeholder="Search titles…" aria-label="Search articles">
  </div>
</header>

<main class="wrap">
  <div id="list" class="grid" role="list"></div>
  <div id="empty" class="empty" hidden>Nothing to show yet.</div>
</main>

<footer class="wrap" style="margin:24px 0 16px">
  <p class="muted">© 2025 VPN World • <a href="/en-gb/privacy.html">Privacy Policy</a></p>
</footer>

<script>
(async function(){
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('badgeCount');
  const q = document.getElementById('q');

  async function getJSON(url){
    const r = await fetch(url, {cache:'no-store'});
    if(!r.ok) throw new Error(url+' → '+r.status);
    return r.json();
  }

  function render(items){
    list.innerHTML = '';
    if(!items.length){ empty.hidden=false; badge.textContent='0'; return; }
    empty.hidden=true;
    badge.textContent = items.length;
    for(const it of items){
      const card = document.createElement('article');
      card.className = 'card';
      card.setAttribute('role','listitem');
      card.innerHTML = `
        <h3 style="margin:.25rem 0 .35rem"><a href="${it.url}">${it.title}</a></h3>
        ${it.date ? `<p class="muted" style="margin:0">Updated: <time datetime="${it.date}">${it.date}</time></p>` : ''}
      `;
      list.appendChild(card);
    }
  }

  function normalize(s){ return (s||'').toLowerCase(); }

  let source = [];
  try{
    const m = await getJSON('/en-gb/blog/manifest.json');
    source = (m.items || []).map(x => ({title:x.title, url:x.url, date:m.lastUpdated}));
  }catch(e){
    console.warn('manifest.json unavailable, trying sitemap.xml', e);
    // fallback на sitemap.xml (поддержка, если добавишь UK ссылки в основной сайтмап)
    try{
      const xml = await fetch('/sitemap.xml', {cache:'no-store'}).then(r=>r.text());
      const doc = new DOMParser().parseFromString(xml,'application/xml');
      const urls = [...doc.querySelectorAll('url loc')].map(n=>n.textContent.trim());
      const uk = urls.filter(u => u.includes('/en-gb/blog/'));
      source = uk.map(u => ({title: u.split('/').pop().replace(/-/g,' ').replace('.html',''), url: u}));
    }catch(err){
      console.error('sitemap fallback failed', err);
      source = [];
    }
  }

  // сортировка по алфавиту (можно заменить на по дате, если добавим даты в manifest)
  source.sort((a,b) => a.title.localeCompare(b.title));
  render(source);

  q.addEventListener('input', () => {
    const term = normalize(q.value);
    const filtered = !term ? source : source.filter(it => normalize(it.title).includes(term));
    render(filtered);
  });
})();
</script>
</body>
</html>
