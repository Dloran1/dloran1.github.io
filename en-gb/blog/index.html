<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — all articles (UK) | VPN World</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="All UK VPN guides in one place — setup, streaming, speed & privacy.">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
  <style>
    .wrap{max-width:960px;margin:0 auto;padding:0 16px}
    .switch{margin:.5rem 0 1rem}
    .cards{display:grid;gap:12px}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:14px}
    .card a{font-weight:700;text-decoration:none}
    .muted{opacity:.8}
    .search{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(140,140,160,.35);background:rgba(255,255,255,.02);margin:10px 0 16px}
    .chip{display:inline-block;border:1px solid rgba(140,140,160,.35);border-radius:8px;padding:2px 8px;margin-left:.4rem;font-size:.85rem}
  </style>
  <link rel="alternate" hreflang="en-gb" href="https://dloran1.github.io/en-gb/blog/">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/">
  <link rel="alternate" hreflang="x-default" href="https://dloran1.github.io/en-gb/blog/">
</head>
<body>
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ul><li><a href="/en-gb/">Home</a></li><li aria-current="page">Blog (UK)</li></ul>
</nav>

<main class="wrap">
  <h1>Blog — all articles (UK) <span id="count" class="chip">0</span></h1>
  <p class="muted">All UK guides in one place — setup, streaming, speed & privacy.</p>

  <div class="switch"><a href="/en-gb/blog/">English (UK)</a> | <a href="/blog/">Polski (PL)</a></div>

  <input id="q" class="search" type="search" placeholder="Search titles…">

  <section id="list" class="cards" aria-live="polite"></section>
</main>

<footer class="foot">
  <p>© 2025 VPN World • <a href="/en-gb/privacy.html">Privacy Policy</a> • <a href="/pl/polityka-prywatnosci.html" lang="pl">Polityka prywatności</a></p>
</footer>

<script>
(async function(){
  const list = document.getElementById('list');
  const q = document.getElementById('q');
  const wantUK = (u)=>u.startsWith('https://dloran1.github.io/en-gb/blog/');
  const resp = await fetch('/sitemap.xml',{cache:'no-store'});
  const xml = await resp.text();
  const locs = [...xml.matchAll(/<loc>([^<]+)<\/loc>/g)].map(m=>m[1]).filter(wantUK);
  const items = [];
  for (const url of locs){
    const m = xml.match(new RegExp(`<url>\\s*<loc>${url.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}</loc>[\\s\\S]*?<lastmod>([^<]+)<`));
    const lastmod = m?m[1]:'';
    const slug = url.split('/').pop().replace('.html','').replace(/-/g,' ');
    const title = slug.charAt(0).toUpperCase()+slug.slice(1);
    items.push({url,title,lastmod});
  }
  const render = (arr)=>{
    list.innerHTML = arr.map(it=>`
      <article class="card">
        <a href="${new URL(it.url).pathname}">${it.title}</a>
        <div class="muted">Updated: ${it.lastmod||'—'}</div>
      </article>`).join('');
    document.getElementById('count').textContent = arr.length;
  };
  render(items);
  q.addEventListener('input',()=> {
    const v = q.value.toLowerCase();
    render(items.filter(i=>i.title.toLowerCase().includes(v)));
  });
})();
</script>

<script src="/assets/js/consent.js"></script>
<script src="/assets/js/privacy.js"></script>
<script src="/assets/js/langswitch.js"></script>
</body>
</html>
