<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — all articles (UK)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="en-gb" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
  <style>
    .container{max-width:980px;margin:0 auto;padding:24px 16px}
    .count{display:inline-block;min-width:40px;text-align:center;border-radius:10px;padding:4px 8px;background:#10151c;border:1px solid #243244;margin-left:.5rem}
    .list{display:grid;gap:12px;margin:18px 0}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:14px 16px}
    .card h3{margin:0 0 6px;font-size:1.05rem}
    .meta{opacity:.7;font-size:.9rem}
    .switch{margin:12px 0}
    .switch a{margin-right:12px}
    .search-wrap{display:flex;gap:10px;align-items:center;margin:12px 0}
    .search{flex:1;border-radius:8px;border:1px solid rgba(140,140,160,.35);padding:10px 12px;background:#0b1220;color:#e6e8ee}
    footer{margin:28px 0;text-align:center;opacity:.85}
  </style>
</head>
<body>
  <nav class="container" aria-label="Breadcrumb">
    <a href="/en-gb/">Home</a> › <span>Blog (UK)</span>
  </nav>

  <main class="container">
    <h1>Blog — all articles (UK) <span class="count" id="count">0</span></h1>
    <p>All UK guides in one place — setup, streaming, speed &amp; privacy.</p>

    <p class="switch"><a href="/en-gb/blog/index.html">English (UK)</a> | <a href="/blog/index.html">Polski (PL)</a></p>

    <div class="search-wrap">
      <label for="q" class="sr-only">Search titles…</label>
      <input id="q" class="search" placeholder="Search titles…">
    </div>

    <section class="list" id="list" aria-live="polite"></section>
  </main>

  <footer class="container">
    <p>© 2025 VPN World · <a href="/en-gb/privacy.html">Privacy Policy (EN)</a> · <a href="/pl/polityka-prywatnosci.html">Polityka prywatności (PL)</a></p>
  </footer>

  <script>
  (function(){
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const qEl = document.getElementById('q');

    // --- РЕЗЕРВНЫЙ СТАТИЧЕСКИЙ СПИСОК (EN-GB) ---
    const FALLBACK = [
      "/en-gb/blog/best-vpn-uk.html",
      "/en-gb/blog/free-vs-paid-vpn-uk.html",
      "/en-gb/blog/what-is-vpn-uk.html",
      "/en-gb/blog/why-vpn-2025-uk.html",
      "/en-gb/blog/which-vpn-server-uk.html",
      "/en-gb/blog/vpn-myths-uk.html",
      "/en-gb/blog/no-logs-uk.html",
      "/en-gb/blog/nordvpn-vs-surfshark-uk.html",
      "/en-gb/blog/vpn-iplayer-uk.html",
      "/en-gb/blog/vpn-speed-test-uk.html",
      "/en-gb/blog/vpn-2fa-mfa-uk.html",
      "/en-gb/blog/is-vpn-legal-uk.html",
      "/en-gb/blog/vpn-android-uk.html",
      "/en-gb/blog/vpn-ios-uk.html",
      "/en-gb/blog/vpn-mac-uk.html",
      "/en-gb/blog/vpn-linux-uk.html",
      "/en-gb/blog/vpn-router-setup-uk.html",
      "/en-gb/blog/vpn-on-router-uk.html",
      "/en-gb/blog/vpn-best-settings-uk.html",
      "/en-gb/blog/vpn-port-forwarding-uk.html",
      "/en-gb/blog/vpn-protocols-uk.html",
      "/en-gb/blog/vpn-public-wifi-uk.html",
      "/en-gb/blog/vpn-remote-work-uk.html",
      "/en-gb/blog/vpn-security-uk.html",
      "/en-gb/blog/vpn-travel-uk.html",
      "/en-gb/blog/vpn-streaming-uk.html",
      "/en-gb/blog/vpn-smart-tv-uk.html",
      "/en-gb/blog/vpn-apple-tv-uk.html",
      "/en-gb/blog/vpn-gaming-uk.html",
      "/en-gb/blog/vpn-ps5-xbox-uk.html",
      "/en-gb/blog/vpn-sky-go-uk.html",
      "/en-gb/blog/vpn-netflix-uk.html",
      "/en-gb/blog/vpn-dns-leak-uk.html",
      "/en-gb/blog/vpn-kill-switch-uk.html",
      "/en-gb/blog/double-vpn-uk.html",
      "/en-gb/blog/free-vpn-uk.html",
      "/en-gb/blog/proxy-vs-vpn-uk.html",
      "/en-gb/blog/vpn-advantages-uk.html",
      "/en-gb/blog/dedicated-ip-vpn-uk.html",
      "/en-gb/blog/vpn-torrenting-uk.html",
      "/en-gb/blog/vpn-windows-uk.html"
    ];

    function slugToTitle(slug){
      return slug
        .replace(/^\/|\.html$/g,'')
        .split('/').pop()
        .replace(/-/g,' ')
        .replace(/\b\w/g, m=>m.toUpperCase());
    }

    function render(items){
      listEl.innerHTML = '';
      items.forEach(url=>{
        const title = url.title || slugToTitle(url.url||url);
        const href  = url.url || url;
        const date  = url.date || '—';
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `<h3><a href="${href}">${title}</a></h3>
                          <div class="meta">Updated: <time>${date}</time></div>`;
        listEl.appendChild(card);
      });
      countEl.textContent = items.length;
    }

    function filter(items, q){
      q = q.trim().toLowerCase();
      if(!q) return items;
      return items.filter(x=>{
        const t = (x.title || slugToTitle(x.url||x)).toLowerCase();
        return t.includes(q);
      });
    }

    // поиск
    let currentItems = [];
    qEl.addEventListener('input', ()=> render(filter(currentItems, qEl.value)));

    // --- загрузка sitemap ---
    fetch('/sitemap.xml',{cache:'no-store'})
      .then(r=>r.text())
      .then(xml=>{
        const urls = Array.from(xml.matchAll(/<loc>([^<]+)<\/loc>/g)).map(m=>m[1]);
        const uks = urls
          .filter(u => u.includes('/en-gb/blog/') && !u.endsWith('/en-gb/blog/index.html'))
          .map(u => ({url: new URL(u).pathname, title: '', date: (xml.match(new RegExp(`<loc>${u.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}<\\/loc>\\s*<lastmod>([^<]+)<\\/lastmod>`))||[])[1] || '—' }));
        if (uks.length) {
          currentItems = uks;
          render(currentItems);
        } else {
          currentItems = FALLBACK.map(u=>({url:u}));
          render(currentItems);
        }
      })
      .catch(()=>{
        currentItems = FALLBACK.map(u=>({url:u}));
        render(currentItems);
      });
  })();
  </script>
</body>
</html>
