<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — all articles (UK)</title>
  <meta name="description" content="All UK VPN World articles: setup, streaming, speed & privacy. Auto-synced with the sitemap.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
  <style>
    .wrap{max-width:980px;margin:0 auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:14px;background:rgba(255,255,255,.03)}
    .card a{color:#2E90FA;text-decoration:none}
    .card a:hover{text-decoration:underline}
    .muted{opacity:.85}
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 18px}
    .filters input{flex:1;min-width:220px;padding:10px;border-radius:10px;border:1px solid rgba(140,140,160,.35);background:rgba(255,255,255,.04);color:inherit}
    .badge{display:inline-block;padding:.2rem .5rem;border:1px solid rgba(140,140,160,.35);border-radius:6px;font-size:.8rem;margin-left:6px}
    .lang-switch{margin:8px 0 16px}
    .lang-switch a{color:#2E90FA;text-decoration:none;margin-right:8px}
    .lang-switch a:hover{text-decoration:underline}
    .empty{border:1px dashed rgba(140,140,160,.35);border-radius:12px;padding:18px;text-align:center}
  </style>
</head>
<body>
<nav class="wrap" aria-label="Breadcrumb">
  <p><a href="/en-gb/">Home</a> › <strong>Blog (UK)</strong></p>
</nav>

<header class="wrap">
  <h1>Blog — all articles (UK)</h1>
  <p class="muted">All UK guides in one place — setup, streaming, speed & privacy.
    <span class="badge" id="badgeCount">0</span></p>

  <!-- language switch -->
  <nav class="lang-switch" aria-label="Language switch">
    <a href="/en-gb/blog/" lang="en-GB">English (UK)</a> |
    <a href="/blog/" lang="pl-PL">Polski (PL)</a>
  </nav>

  <div class="filters">
    <input id="q" type="search" placeholder="Search titles…" aria-label="Search articles">
  </div>
</header>

<main class="wrap">
  <div id="list" class="grid" role="list"></div>
  <div id="empty" class="empty" hidden>Nothing to show yet.</div>
</main>

<footer class="wrap" style="margin:24px 0 16px">
  <p class="muted">© 2025 VPN World • <a href="/en-gb/privacy.html">Privacy Policy</a></p>
</footer>

<script>
/* ---------- Helper: fetch with timeout ---------- */
function withTimeout(promise, ms=12000){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),ms))]);
}

/* ---------- Parse sitemap.xml, mirror PL → UK ---------- */
async function loadFromSitemap(){
  const text = await withTimeout(fetch('/sitemap.xml?cb='+Date.now(), {cache:'no-store'}).then(r=>r.text()));
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  const urls = [...doc.querySelectorAll('url')].map(u=>{
    const loc = u.querySelector('loc')?.textContent?.trim()||'';
    const lastmod = u.querySelector('lastmod')?.textContent?.trim()||'';
    return {loc, lastmod};
  });
  // берём только польские статьи из /blog/*.html
  const plPosts = urls.filter(u => /\/blog\/[^/]+\.html$/.test(u.loc));
  // строим UK путь 1-в-1 по имени файла
  const candidates = plPosts.map(p=>{
    const file = p.loc.split('/blog/')[1]; // e.g. vpn-android-konfiguracja.html
    const uk = '/en-gb/blog/' + file.replace(/-polska|\-pl/gi,'').replace(/\.html$/i,'.html');
    return { ukUrl: uk, lastmod: p.lastmod, seed: p.loc };
  });
  // проверяем, что UK страница существует
  const limit = 6; // мягкий пул запросов
  let i=0, out=[];
  async function worker(){
    while(i < candidates.length){
      const idx = i++;
      const c = candidates[idx];
      try{
        const res = await withTimeout(fetch(c.ukUrl+'?cb='+Date.now(), {cache:'no-store'}));
        if(res.ok){
          const html = await res.text();
          const doc = new DOMParser().parseFromString(html,'text/html');
          const title =
            doc.querySelector('meta[property="og:title"]')?.content?.trim() ||
            doc.querySelector('h1')?.textContent?.trim() ||
            doc.querySelector('title')?.textContent?.trim() ||
            c.ukUrl.split('/').pop().replace(/-/g,' ').replace(/\.html$/,'');
          out.push({title, url:c.ukUrl, date:c.lastmod});
        }
      }catch(e){/* skip missing */}
    }
  }
  await Promise.all(new Array(limit).fill(0).map(worker));
  // сортировка по дате (если есть), иначе по заголовку
  out.sort((a,b)=>{
    if(a.date && b.date) return b.date.localeCompare(a.date);
    return a.title.localeCompare(b.title);
  });
  return out;
}

/* ---------- Render ---------- */
(function(){
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('badgeCount');
  const q = document.getElementById('q');

  function render(items){
    list.innerHTML='';
    if(!items.length){ empty.hidden=false; badge.textContent='0'; return; }
    empty.hidden=true; badge.textContent=items.length;
    for(const it of items){
      const el=document.createElement('article');
      el.className='card'; el.setAttribute('role','listitem');
      el.innerHTML=`<h3 style="margin:.25rem 0 .35rem"><a href="${it.url}">${it.title}</a></h3>
        ${it.date?`<p class="muted" style="margin:0">Updated: <time datetime="${it.date}">${it.date}</time></p>`:''}`;
      list.appendChild(el);
    }
  }

  let SOURCE=[];
  render(SOURCE); // стартовый пустой

  // грузим с sitemap (аналогия с PL)
  loadFromSitemap().then(items=>{
    SOURCE = items;
    render(SOURCE);
  }).catch(()=>{
    empty.hidden=false;
  });

  q.addEventListener('input',()=>{
    const t=(q.value||'').toLowerCase();
    render(!t?SOURCE:SOURCE.filter(x=>x.title.toLowerCase().includes(t)));
  });
})();
</script>
</body>
</html>
