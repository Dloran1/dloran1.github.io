<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Blog — all articles (UK)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="All UK VPN World guides in one place — setup, streaming, speed & privacy.">
  <link rel="canonical" href="https://dloran1.github.io/en-gb/blog/index.html">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">

  <!-- hreflang -->
  <link rel="alternate" hreflang="en-GB" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="x-default" href="https://dloran1.github.io/en-gb/blog/index.html">
</head>
<body>
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ul>
    <li><a href="/en-gb/">Home</a></li>
    <li aria-current="page">Blog (UK)</li>
  </ul>
</nav>

<main class="container">
  <header>
    <h1>Blog — all articles (UK) <span id="count" class="badge">0</span></h1>
    <p>All UK guides in one place — setup, streaming, speed &amp; privacy.</p>
    <p><a href="/en-gb/blog/index.html">English (UK)</a> | <a href="/blog/index.html">Polski (PL)</a></p>
    <input id="search" type="search" placeholder="Search titles…" aria-label="Search titles…">
  </header>

  <section id="list" class="cards"></section>
</main>

<footer class="foot">
  <p>© 2025 VPN World · <a href="/en-gb/privacy.html">Privacy Policy (EN)</a> · <a href="/pl/polityka-prywatnosci.html">Polityka prywatności (PL)</a></p>
</footer>

<!-- Scripts (обязательные) -->
<script src="/assets/js/consent.js"></script>
<script src="/assets/js/privacy.js"></script>
<script src="/assets/js/langswitch.js"></script>

<script>
(function () {
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const searchEl = document.getElementById('search');

  const SELF_INDEX = location.origin + '/en-gb/blog/index.html';

  function titleFromSlug(url) {
    const slug = url.split('/').pop().replace('.html','');
    return slug
      .replace(/-/g, ' ')
      .replace(/\b\w/g, m => m.toUpperCase());
  }

  function cardHTML(url, lastmod) {
    const t = titleFromSlug(url);
    const date = lastmod || '—';
    return `
      <article class="card">
        <h2 class="card-title"><a href="${url}">${t}</a></h2>
        <p class="muted">Updated: ${date}</p>
      </article>`;
  }

  function render(items) {
    listEl.innerHTML = items.map(it => cardHTML(it.loc, it.lastmod)).join('');
    countEl.textContent = items.length;
  }

  function filterForUK(entries) {
    return entries
      .filter(e => e.loc.startsWith(location.origin + '/en-gb/blog/'))
      .filter(e => e.loc !== SELF_INDEX); // exclude self index.html
  }

  function attachSearch(items) {
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = items.filter(it => titleFromSlug(it.loc).toLowerCase().includes(q));
      render(filtered);
    });
  }

  fetch('/sitemap.xml', {cache: 'no-store'})
    .then(r => r.text())
    .then(xml => {
      const doc = new window.DOMParser().parseFromString(xml, 'application/xml');
      const nodes = Array.from(doc.querySelectorAll('urlset > url'));
      const all = nodes.map(n => ({
        loc: n.querySelector('loc')?.textContent?.trim() || '',
        lastmod: n.querySelector('lastmod')?.textContent?.trim() || ''
      }));
      const uk = filterForUK(all);
      uk.sort((a,b) => titleFromSlug(a.loc).localeCompare(titleFromSlug(b.loc), 'en', {sensitivity:'base'}));
      render(uk);
      attachSearch(uk);
    })
    .catch(() => {
      listEl.innerHTML = `<p class="warn">Couldn’t load sitemap.xml</p>`;
      countEl.textContent = '0';
    });
})();
</script>
</body>
</html>
