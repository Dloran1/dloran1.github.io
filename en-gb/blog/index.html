<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — all articles (UK)</title>
  <link rel="preconnect" href="https://dloran1.github.io">
  <link rel="stylesheet" href="/assets/site.css">
  <style>
    body{max-width:900px;margin:0 auto;padding:24px}
    .lang a{margin-right:12px}
    .count{display:inline-block;background:#223042;color:#fff;border-radius:8px;padding:2px 8px;margin-left:8px}
    .card{border-radius:14px;background:#0f1722; padding:18px 16px; margin:12px 0; border:1px solid #233146}
    .card a{font-weight:700; color:#4db2ff; text-decoration:none}
    .muted{opacity:.7;font-size:.95rem;margin-top:8px}
    footer{margin:40px 0 8px;opacity:.8}
  </style>
</head>
<body>
  <nav><a href="/">Home</a> › <strong>Blog (UK)</strong></nav>
  <h1>Blog — all articles (UK) <span id="uk-count" class="count">0</span></h1>
  <p>All UK guides in one place — setup, streaming, speed & privacy.</p>

  <p class="lang"><a href="/en-gb/blog/index.html">English (UK)</a> | <a href="/blog/index.html">Polski (PL)</a></p>

  <input id="search" placeholder="Search titles…" aria-label="Search titles…">

  <div id="list"></div>

  <footer>
    © 2025 VPN World ·
    <a href="/privacy.html">Privacy Policy (EN)</a> ·
    <a href="/polityka-prywatnosci.html">Polityka prywatności (PL)</a>
  </footer>

<script>
(async () => {
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('uk-count');
  const searchEl = document.getElementById('search');

  let urls = [];
  try {
    const sm = await fetch('/sitemap.xml', {cache:'no-store'});
    const xml = new DOMParser().parseFromString(await sm.text(), 'application/xml');
    urls = [...xml.querySelectorAll('url loc')].map(n=>n.textContent.trim());
  } catch(e){}

  // Только UK, без index.html
  urls = urls
    .filter(u => u.startsWith(location.origin + '/en-gb/blog/'))
    .filter(u => !/\/en-gb\/blog\/index\.html$/.test(u));

  if (!urls.length) {
    try {
      const mf = await fetch('/manifest.en-gb.json', {cache:'no-store'});
      const data = await mf.json();
      urls = data.urls.map(p => location.origin + p);
    } catch(e){}
  }

  const okUrls = [];
  for (const u of urls) {
    try {
      const r = await fetch(u, {method:'HEAD', cache:'no-store'});
      if (r.ok) okUrls.push(u);
    } catch(e){}
  }

  okUrls.sort((a,b)=>a.localeCompare(b));

  const items = await Promise.all(okUrls.map(async (u) => {
    let title = u.split('/').pop().replace('.html','').replace(/-/g,' ');
    try {
      const r = await fetch(u, {cache:'no-store'});
      if (r.ok) {
        const t = await r.text();
        const m = t.match(/<title>(.*?)<\/title>/i);
        if (m) title = m[1].trim();
      }
    } catch(e){}
    return {u, title};
  }));

  const q = (txt) => txt.toLowerCase();
  const render = () => {
    const term = q(searchEl.value || '');
    listEl.innerHTML = '';
    items.filter(it => q(it.title).includes(term)).forEach(it => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<a href="${new URL(it.u).pathname}">${it.title}</a>
                        <div class="muted">Updated: —</div>`;
      listEl.appendChild(card);
    });
    countEl.textContent = String(items.filter(it => q(it.title).includes(term)).length);
  };
  searchEl.addEventListener('input', render);
  render();
})();
</script>
</body>
</html>
