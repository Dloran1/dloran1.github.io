/* ----------------------- RENDER + OPTIONAL MANIFEST ----------------------- */
(function(){
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('badgeCount');
  const q = document.getElementById('q');

  function render(items){
    list.innerHTML='';
    if(!items.length){ empty.hidden=false; badge.textContent='0'; return; }
    empty.hidden=true; badge.textContent=items.length;
    for(const it of items.sort((a,b)=>a.title.localeCompare(b.title))){
      const el=document.createElement('article');
      el.className='card'; el.setAttribute('role','listitem');
      el.innerHTML=`<h3 style="margin:.25rem 0 .35rem"><a href="${it.url}">${it.title}</a></h3>
        ${it.date?`<p class="muted" style="margin:0">Updated: <time datetime="${it.date}">${it.date}</time></p>`:''}`;
      list.appendChild(el);
    }
  }

  let SOURCE = window.__UK_ITEMS.slice();
  render(SOURCE);

  q.addEventListener('input',()=>{
    const t=(q.value||'').toLowerCase();
    render(!t?SOURCE:SOURCE.filter(x=>x.title.toLowerCase().includes(t)));
  });

  // optional override from manifest.json (if present)
  fetch('/en-gb/blog/manifest.json?v='+Date.now(),{cache:'no-store'})
    .then(r=>r.ok?r.json():Promise.reject())
    .then(m=>{
      const items=(m&&m.items)||[];
      if(items.length){
        SOURCE = items.map(x=>({title:x.title,url:x.url,date:m.lastUpdated||''}));
        render(SOURCE);
      }
    })
    .catch(()=>{/* no manifest — fine, we already rendered embedded list */});
})();
