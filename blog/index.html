<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — wszystkie artykuły (PL)</title>
  <meta name="description" content="Wszystkie poradniki VPN w jednym miejscu — konfiguracja, streaming, prędkość & prywatność.">
  <link rel="canonical" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="en-gb" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">Strona główna</a> › <span>Blog (PL)</span>
    </nav>
  </header>

  <main>
    <h1>Blog — wszystkie artykuły (PL) <span id="count"></span></h1>
    <p>Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość & prywatność.</p>

    <p>
      <a href="/blog/index.html">Polski (PL)</a> |
      <a href="/en-gb/blog/index.html">English (UK)</a>
    </p>

    <input id="search" placeholder="Szukaj tytułów..." />

    <div id="list"></div>
  </main>

  <footer>
    <p>© 2025 VPN World • <a href="/privacy.html">Polityka prywatności</a></p>
  </footer>

  <script>
  (async () => {
    const IS_UK  = location.pathname.startsWith('/en-gb/');
    const BASE   = IS_UK ? '/en-gb/blog/' : '/blog/';

    const listEl   = document.querySelector('#list');
    const countEl  = document.querySelector('#count');
    const searchEl = document.querySelector('#search');

    function render(items) {
      listEl.innerHTML = '';
      items.forEach(({loc, title, lastmod}) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = loc;
        a.innerHTML = `
          <strong>${title}</strong>
          <div class="muted">Zaktualizowano: ${lastmod || '—'}</div>
        `;
        listEl.appendChild(a);
      });
      countEl.textContent = items.length;
    }

    function titleFromUrl(u) {
      const slug = u.split('/').pop().replace('.html','');
      return slug
        .replace(/-/g,' ')
        .replace(/\b\w/g, s => s.toUpperCase());
    }

    let items = [];
    try {
      const res = await fetch('/sitemap.xml', { cache: 'no-store' });
      const xml = await res.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const urls = [...doc.querySelectorAll('url')];

      const filtered = urls
        .map(node => ({
          loc: node.querySelector('loc')?.textContent?.trim() || '',
          lastmod: node.querySelector('lastmod')?.textContent?.trim() || ''
        }))
        .filter(x => {
          try {
            const p = new URL(x.loc).pathname;
            if (!p.startsWith(BASE)) return false;
            if (p.endsWith('/index.html')) return false;
            return true;
          } catch { return false; }
        });

      const seen = new Set();
      items = filtered
        .filter(x => {
          if (seen.has(x.loc)) return false;
          seen.add(x.loc);
          return true;
        })
        .map(x => ({...x, title: titleFromUrl(x.loc)}))
        .sort((a,b) => (b.lastmod || '').localeCompare(a.lastmod || ''));
    } catch (e) {
      console.warn('Sitemap parse failed:', e);
      items = [];
    }

    render(items);

    searchEl?.addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = items.filter(it => it.title.toLowerCase().includes(q));
      render(filtered);
    });
  })();
  </script>
</body>
</html>
