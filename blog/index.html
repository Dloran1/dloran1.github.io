<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — wszystkie artykuły (PL) | VPN World</title>
  <meta name="description" content="Wszystkie poradniki VPN World w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://dloran1.github.io/blog/">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">
  <link rel="alternate" hreflang="en-GB" href="https://dloran1.github.io/en-gb/blog/">
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/">
  <link rel="alternate" hreflang="x-default" href="https://dloran1.github.io/blog/">
  <style>
    .wrap{max-width:980px;margin:0 auto;padding:0 16px}
    .langswitch{margin:10px 0 18px}
    .counter{display:inline-block;margin-left:8px;padding:2px 8px;border:1px solid rgba(140,140,160,.35);border-radius:8px;font-weight:600}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:16px;margin:12px 0}
    .muted{opacity:.8}
    .search{width:100%;padding:12px 14px;border:1px solid rgba(140,140,160,.35);border-radius:10px;background:rgba(255,255,255,.03);color:inherit}
  </style>
</head>
<body>
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ul>
    <li><a href="/">Strona główna</a></li>
    <li aria-current="page">Blog (PL)</li>
  </ul>
</nav>

<main class="wrap">
  <h1>Blog — wszystkie artykuły (PL) <span id="count" class="counter">0</span></h1>
  <p class="muted">Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość &amp; prywatność.</p>

  <p class="langswitch"><a href="/blog/">Polski (PL)</a> | <a href="/en-gb/blog/">English (UK)</a></p>

  <input id="q" class="search" placeholder="Szukaj tytułów…">

  <div id="list"></div>
</main>

<footer class="foot">
  <p>© 2025 VPN World •
     <a href="/en-gb/privacy.html">Privacy Policy (EN)</a> •
     <a href="/pl/polityka-prywatnosci.html" lang="pl">Polityka prywatności (PL)</a>
  </p>
</footer>

<script src="/assets/js/langswitch.js"></script>
<script src="/assets/js/consent.js"></script>
<script src="/assets/js/privacy.js"></script>

<script>
(async function(){
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const q = document.getElementById('q');

  // берём все PL-URL из sitemap.xml (те что под /blog/)
  const sm = await fetch('/sitemap.xml').then(r=>r.text());
  const urls = [...sm.matchAll(/<loc>(https?:\/\/[^<]+)<\/loc>/g)].map(m=>m[1])
                .filter(u => /\/blog\/[^/]+\.html$/.test(u));
  countEl.textContent = urls.length;

  // небольшой хелпер для красивых заголовков
  function slugToTitle(slug){
    return slug
      .replace(/\.html$/,'')
      .split('/').pop()
      .replace(/-/g,' ')
      .replace(/\b\w/g, s=>s.toUpperCase());
  }

  let items = urls.map(u=>{
    const title = slugToTitle(u);
    return {url: new URL(u).pathname, title, date: '2025-09-19'};
  });

  function render(filter=''){
    listEl.innerHTML = '';
    const f = filter.trim().toLowerCase();
    items
      .filter(it => !f || it.title.toLowerCase().includes(f))
      .forEach(it=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3><a href="${it.url}">${it.title}</a></h3>
          <p class="muted">Zaktualizowano: 2025-09-19</p>`;
        listEl.appendChild(card);
      });
  }

  q.addEventListener('input', ()=>render(q.value));
  render();
})();
</script>
</body>
</html>
