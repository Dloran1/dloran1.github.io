<!-- scripts -->
<script src="/assets/js/consent.js"></script>

<script src="/assets/js/langswitch.js"></script>
<script>
(function(){
  const ROOT = location.origin;
  const PREFIX = ROOT + "/blog/";
  const SITEMAP = ROOT + "/sitemap.xml";

  // Резервный список (если sitemap ещё не обновился)
  const FALLBACK = [
    "co-to-jest-vpn.html","darmowe-vs-platne-vpn.html","darmowy-vpn-polska.html",
    "dlaczego-vpn-2025.html","jaki-serwer-vpn-wybrac.html","jaki-serwer-vpn.html",
    "mity-o-vpn.html","no-logs.html","nordvpn-vs-surfshark-pl.html","player-tvp-vpn.html",
    "test-vpn.html","tvp-vod-vpn.html","vpn-2fa-mfa.html","vpn-a-prawo-w-polsce.html",
    "vpn-android-konfiguracja.html","vpn-bankowosc-online.html","vpn-dedykowany-ip.html",
    "vpn-dla-apple-tv.html","vpn-dla-firm-msp.html","vpn-dla-graczy.html",
    "vpn-dla-konsol-ps5-xbox.html","vpn-dla-smart-tv.html","vpn-dns-leak.html",
    "vpn-double-vpn.html","vpn-geoblokady.html","vpn-geolokalizacja.html",
    "vpn-iphone-konfiguracja.html","vpn-kill-switch.html","vpn-linux-konfiguracja.html",
    "vpn-na-mac.html","vpn-netflix-polska.html","vpn-optymalne-ustawienia.html",
    "vpn-p2p-bezpiecznie.html","vpn-port-forwarding.html","vpn-praca-zdalna.html",
    "vpn-proxy-vs-vpn.html","vpn-publiczne-wifi.html","vpn-split-tunneling.html",
    "vpn-szybkosc-test.html","vpn-torrent-polska.html","vpn-torrent.html",
    "vpn-windows-konfiguracja.html","wady-vpn.html","wifi-bezpieczenstwo.html",
    "wifi-checklista.html","wireguard-vs-openvpn.html","zalety-vpn.html"
  ].map(slug => PREFIX + slug);

  const list = document.getElementById('list');
  const count = document.getElementById('count');
  const q = document.getElementById('q');

  const formatTitle = t => t.replace(/\s+\|\s+.*$/, '');
  const card = (u,title,lastmod) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.title = title.toLowerCase();
    div.innerHTML = `
      <h2 style="margin:.2rem 0 .35rem 0;"><a href="${u}">${title}</a></h2>
      <p class="muted">Zaktualizowano: ${lastmod || '—'}</p>
    `;
    return div;
  };

  function render(items){
    list.innerHTML = '';
    items.forEach(it => list.appendChild(card(it.url, it.title, it.lastmod)));
    count.textContent = items.length;
  }

  async function fetchTitle(url){
    try{
      const r = await fetch(url, {mode:'same-origin'});
      const h = await r.text();
      const doc = new DOMParser().parseFromString(h, 'text/html');
      const t = (doc.querySelector('title')?.textContent || doc.querySelector('h1')?.textContent || url);
      return formatTitle(t.trim());
    }catch(e){ return url.split('/').pop().replace(/-/g,' ').replace('.html',''); }
  }

  async function build(){
    try{
      const x = await fetch(SITEMAP);
      const xml = await x.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const urls = [...doc.querySelectorAll('urlset > url')].map(n => ({
        loc: n.querySelector('loc')?.textContent || '',
        lastmod: n.querySelector('lastmod')?.textContent || ''
      }));
      // только польские статьи, без index.html
      let pl = urls.filter(u => u.loc.startsWith(PREFIX) && !u.loc.endsWith('/index.html'));
      if(pl.length === 0){ pl = FALLBACK.map(u => ({loc:u,lastmod:''})); }
      // наполняем заголовки
      const items = [];
      for(const u of pl){
        const title = await fetchTitle(u.loc);
        items.push({url:u.loc, title, lastmod:u.lastmod});
      }
      // сортировка по lastmod (новые вверх)
      items.sort((a,b)=>(b.lastmod||'').localeCompare(a.lastmod||''));
      render(items);

      // поиск
      q.addEventListener('input', () => {
        const v = q.value.trim().toLowerCase();
        [...list.children].forEach(el => {
          el.style.display = el.dataset.title.includes(v) ? '' : 'none';
        });
      });
    }catch(e){
      // аварийный рендер из FALLBACK
      const items = await Promise.all(FALLBACK.map(async u => ({url:u, title: await fetchTitle(u), lastmod:''})));
      render(items);
    }
  }

  build();
})();
</script>
</body>
