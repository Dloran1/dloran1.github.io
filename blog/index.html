<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — wszystkie artykuły (PL)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dloran1.github.io/blog/">
  <link rel="icon" href="/assets/img/favicon.png">
  <meta name="description" content="Wszystkie poradniki VPN w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.">

  <style>
    :root{color-scheme:dark}
    body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,
      Cantarell,'Helvetica Neue',Arial,sans-serif;background:#0b1220;color:#e8eef7}
    .container{max-width:980px;margin:0 auto;padding:18px}
    a{color:#52a8ff;text-decoration:none}
    a:hover{text-decoration:underline}
    header h1{font-size:clamp(28px,5vw,44px);margin:10px 0 6px}
    .lede{opacity:.9;margin:0 0 18px}
    .switch{margin:6px 0 14px}
    .search{display:flex;gap:10px;align-items:center;margin:10px 0 16px}
    .search input{flex:1; padding:10px 12px;border-radius:10px;border:1px solid #2a3a55;background:#0f182b;color:#e8eef7}
    .count{display:inline-flex;align-items:center;justify-content:center;
      min-width:36px;height:32px;border-radius:10px;border:1px solid #2a3a55;margin-left:10px;font-weight:700}
    .list{display:grid;gap:12px}
    .card{border:1px solid #2a3a55;border-radius:12px;padding:14px;background:#0e1628}
    .title{font-weight:800;font-size:20px;margin:0 0 6px}
    .meta{font-size:14px;opacity:.8}
    footer{margin:28px 0 10px;text-align:center;opacity:.85}
    .bad{display:inline-block;background:#2a0e14;border:1px solid #6b1e28;padding:2px 8px;border-radius:8px;margin-left:8px}
  </style>
</head>
<body>
  <nav class="container" aria-label="Breadcrumb">
    <a href="/">Strona główna</a> › <a href="/blog/">Blog (PL)</a>
  </nav>

  <main class="container">
    <header>
      <h1>Blog — wszystkie artykuły (PL) <span id="count" class="count">0</span></h1>
      <p class="lede">Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość &amp; prywatność.</p>
      <p class="switch"><a href="/blog/">Polski (PL)</a> | <a href="/en-gb/blog/">English (UK)</a></p>
    </header>

    <div class="search">
      <label for="q" class="sr-only">Szukaj tytułów…</label>
      <input id="q" type="search" placeholder="Szukaj tytułów…">
    </div>

    <section id="list" class="list" aria-live="polite"></section>

    <footer>
      <p>© 2025 VPN World · <a href="/assets/privacy.html">Privacy & Cookies</a> · <a href="/pl/polityka-prywatnosci.html">Polityka prywatności</a></p>
    </footer>
  </main>

  <script>
  (function(){
    const SITEMAP = '/sitemap.xml';
    const PL_PREFIX = '/blog/';
    const INDEX_NAME = 'index.html';

    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const qEl = document.getElementById('q');

    const pretty = s => s.replace(/\s+/g,' ').trim();
    const titleFromSlug = url => {
      const slug = url.split('/').pop().replace('.html','');
      return pretty(slug.replace(/-/g,' '));
    };

    function render(items){
      listEl.innerHTML='';
      items.forEach(it=>{
        const card=document.createElement('article');
        card.className='card';
        card.innerHTML = `
          <h2 class="title"><a href="${it.loc}">${it.title}</a></h2>
          <p class="meta">Zaktualizowano: ${it.date||'—'}</p>
        `;
        listEl.appendChild(card);
      });
      countEl.textContent = items.length;
    }

    function filterIndex(entries){
      return entries.filter(u=>{
        if(!u.loc.startsWith(PL_PREFIX)) return false;
        return !u.loc.endsWith('/'+INDEX_NAME);
      });
    }

    function parseSitemap(xml){
      const out=[];
      xml.querySelectorAll('urlset > url').forEach(n=>{
        const loc=n.querySelector('loc')?.textContent||'';
        const lastmod=n.querySelector('lastmod')?.textContent||'';
        if(loc) out.push({loc, date:lastmod});
      });
      return out;
    }

    function attachSearch(items){
      qEl.addEventListener('input', ()=>{
        const q = qEl.value.toLowerCase().trim();
        const res = !q ? items : items.filter(it => it.title.toLowerCase().includes(q));
        render(res);
      });
    }

    fetch(SITEMAP, {cache:'no-store'})
      .then(r=>r.ok?r.text():Promise.reject(r.status))
      .then(txt=>new window.DOMParser().parseFromString(txt,'application/xml'))
      .then(xml=>{
        let items = filterIndex(parseSitemap(xml)).map(x=>({
          loc:x.loc, date:x.date, title:titleFromSlug(x.loc)
        }));
        items.sort((a,b)=>a.title.localeCompare(b.title, 'pl'));
        render(items);
        attachSearch(items);
      })
      .catch(err=>{
        listEl.innerHTML =
          `<div class="card"><strong>Nie udało się wczytać sitemap</strong><span class="bad">Błąd: ${err}</span><p class="meta">Sprawdź plik <code>/sitemap.xml</code>.</p></div>`;
        countEl.textContent='0';
      });
  })();
  </script>
</body>
</html>
