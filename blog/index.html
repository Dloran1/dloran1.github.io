<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — wszystkie artykuły (PL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Wszystkie poradniki VPN World w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.">
  <link rel="canonical" href="https://dloran1.github.io/blog/index.html">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">

  <!-- hreflang -->
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="en-GB" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="x-default" href="https://dloran1.github.io/blog/index.html">
</head>
<body>
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ul>
    <li><a href="/">Strona główna</a></li>
    <li aria-current="page">Blog (PL)</li>
  </ul>
</nav>

<main class="container">
  <header>
    <h1>Blog — wszystkie artykuły (PL) <span id="count" class="badge">0</span></h1>
    <p>Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość &amp; prywatność.</p>
    <p><a href="/blog/index.html">Polski (PL)</a> | <a href="/en-gb/blog/index.html">English (UK)</a></p>
    <input id="search" type="search" placeholder="Szukaj tytułów…" aria-label="Szukaj tytułów…">
  </header>

  <section id="list" class="cards"></section>
</main>

<footer class="foot">
  <p>© 2025 VPN World · <a href="/pl/polityka-prywatnosci.html">Polityka prywatności</a> · <a href="/en-gb/privacy.html">Privacy & Cookies</a></p>
</footer>

<!-- Scripts (обязательные) -->
<script src="/assets/js/consent.js"></script>
<script src="/assets/js/privacy.js"></script>
<script src="/assets/js/langswitch.js"></script>

<script>
(function () {
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const searchEl = document.getElementById('search');

  const SELF_INDEX = location.origin + '/blog/index.html';

  function titleFromSlug(url) {
    const slug = url.split('/').pop().replace('.html','');
    return slug
      .replace(/-/g, ' ')
      .replace(/\b\w/g, m => m.toUpperCase());
  }

  function cardHTML(url, lastmod) {
    const t = titleFromSlug(url);
    const date = lastmod || '—';
    return `
      <article class="card">
        <h2 class="card-title"><a href="${url}">${t}</a></h2>
        <p class="muted">Zaktualizowano: ${date}</p>
      </article>`;
  }

  function render(items) {
    listEl.innerHTML = items.map(it => cardHTML(it.loc, it.lastmod)).join('');
    countEl.textContent = items.length;
  }

  function filterForPL(entries) {
    return entries
      .filter(e => e.loc.startsWith(location.origin + '/blog/'))
      .filter(e => e.loc !== SELF_INDEX); // исключаем сам index.html
  }

  function attachSearch(items) {
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = items.filter(it => titleFromSlug(it.loc).toLowerCase().includes(q));
      render(filtered);
    });
  }

  fetch('/sitemap.xml', {cache: 'no-store'})
    .then(r => r.text())
    .then(xml => {
      const doc = new window.DOMParser().parseFromString(xml, 'application/xml');
      const nodes = Array.from(doc.querySelectorAll('urlset > url'));
      const all = nodes.map(n => ({
        loc: n.querySelector('loc')?.textContent?.trim() || '',
        lastmod: n.querySelector('lastmod')?.textContent?.trim() || ''
      }));
      const pl = filterForPL(all);
      // Стабильная сортировка по заголовку
      pl.sort((a,b) => titleFromSlug(a.loc).localeCompare(titleFromSlug(b.loc), 'pl', {sensitivity:'base'}));
      render(pl);
      attachSearch(pl);
    })
    .catch(() => {
      listEl.innerHTML = `<p class="warn">Nie udało się wczytać sitemap.xml</p>`;
      countEl.textContent = '0';
    });
})();
</script>
</body>
</html>
