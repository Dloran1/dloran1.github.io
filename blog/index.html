<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — wszystkie artykuły (PL)</title>
  <meta name="description" content="Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość & prywatność.">
  <link rel="canonical" href="https://dloran1.github.io/blog/index.html">
</head>
<body>
  <h1>Blog — wszystkie artykuły (PL) <span id="article-count">0</span></h1>
  <p>Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość & prywatność.</p>

  <p><a href="/blog/index.html">Polski (PL)</a> | <a href="/en-gb/blog/index.html">English (UK)</a></p>

  <input type="text" id="search" placeholder="Szukaj tytułów...">

  <ul id="article-list"></ul>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const list = document.getElementById("article-list");
      const count = document.getElementById("article-count");

      fetch("/sitemap.xml")
        .then(res => res.text())
        .then(str => (new window.DOMParser()).parseFromString(str, "text/xml"))
        .then(data => {
          const urls = [...data.querySelectorAll("url loc")];
          const plUrls = urls.filter(u => u.textContent.includes("/blog/") && !u.textContent.includes("/en-gb/"));
          count.textContent = plUrls.length;

          plUrls.forEach(u => {
            const loc = u.textContent;
            const li = document.createElement("li");
            li.innerHTML = `<a href="${loc}">${loc.replace("https://dloran1.github.io/blog/", "").replace(".html","").replace(/-/g," ")}</a>`;
            list.appendChild(li);
          });
        })
        .catch(err => {
          console.error("Sitemap load error:", err);
          list.innerHTML = "<p>Nie udało się załadować artykułów.</p>";
        });
    });
  </script>
</body>
</html>
