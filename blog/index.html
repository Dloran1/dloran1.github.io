<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — wszystkie artykuły (PL) | VPN World</title>
  <meta name="description" content="Wszystkie polskie poradniki w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.">
  <link rel="canonical" href="https://dloran1.github.io/blog/index.html">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/style-extensions.css">

  <!-- hreflang (PL ↔ EN-GB) -->
  <link rel="alternate" hreflang="pl" href="https://dloran1.github.io/blog/index.html">
  <link rel="alternate" hreflang="en-GB" href="https://dloran1.github.io/en-gb/blog/index.html">
  <link rel="alternate" hreflang="x-default" href="https://dloran1.github.io/blog/index.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VPN World">
  <meta property="og:title" content="Blog — wszystkie artykuły (PL)">
  <meta property="og:description" content="Wszystkie polskie poradniki w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.">
  <meta property="og:url" content="https://dloran1.github.io/blog/index.html">

  <style>
    .list{display:grid;gap:14px}
    .card{border:1px solid rgba(140,140,160,.35);border-radius:12px;padding:14px}
    .meta{opacity:.75;font-size:.95rem;margin-top:6px}
    .count{display:inline-block;border:1px solid rgba(140,140,160,.35);border-radius:8px;padding:2px 8px;margin-left:8px}
    .langswitch{margin:10px 0 20px}
  </style>
</head>
<body>

<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="/">Strona główna</a> › <span>Blog (PL)</span>
</nav>

<main class="container">
  <header>
    <h1>Blog — wszystkie artykuły (PL) <span id="count" class="count" aria-label="Liczba artykułów">0</span></h1>
    <p>Wszystkie poradniki w jednym miejscu — konfiguracja, streaming, prędkość i prywatność.</p>

    <!-- Widoczny przełącznik języków -->
    <nav class="langswitch" role="navigation" aria-label="Language switcher">
      <a href="/blog/index.html" hreflang="pl">Polski (PL)</a> |
      <a href="/en-gb/blog/index.html" hreflang="en-GB">English (UK)</a>
    </nav>
  </header>

  <label for="q" class="visually-hidden">Szukaj tytułów</label>
  <input id="q" type="search" placeholder="Szukaj tytułów..." aria-controls="list" />

  <section id="list" class="list" aria-live="polite"></section>
</main>

<footer class="foot">
  <p>© 2025 VPN World •
    <a href="/pl/polityka-prywatnosci.html" hreflang="pl">Polityka prywatności (PL)</a> |
    <a href="/en-gb/privacy-policy.html" hreflang="en-GB">Privacy Policy (EN)</a>
  </p>
</footer>

<!-- Scripts (локальные) -->
<script src="/assets/js/consent.js"></script>
<script src="/assets/js/privacy.js"></script>

<script>
(function () {
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const q = document.getElementById('q');

  // Какие URL считаем "PL-статьями"
  const isPL = url => url.startsWith('https://dloran1.github.io/blog/')
                      && !/\/index\.html?$/.test(url);

  function card(item){
    const a = document.createElement('a');
    a.href = item.loc;
    a.className = 'card';
    a.innerHTML = `
      <strong>${item.title}</strong>
      <div class="meta">Zaktualizowano: ${item.lastmod || '—'}</div>
    `;
    return a;
  }

  // простая нормализация заголовка из slug
  function titleFromLoc(loc){
    const slug = loc.split('/').pop().replace('.html','').replace(/-/g,' ');
    return slug.charAt(0).toUpperCase()+slug.slice(1);
  }

  fetch('/sitemap.xml')
    .then(r => r.text())
    .then(xml => (new window.DOMParser()).parseFromString(xml, 'text/xml'))
    .then(doc => {
      const items = [...doc.querySelectorAll('url')].map(u => ({
        loc: u.querySelector('loc')?.textContent.trim(),
        lastmod: u.querySelector('lastmod')?.textContent.trim()
      })).filter(x => x.loc && isPL(x.loc));

      // Заголовки: если нет <title> в самой странице, берём из slug
      items.forEach(it => it.title = titleFromLoc(it.loc));

      // сортировка по lastmod ↓ (если есть)
      items.sort((a,b) => (b.lastmod||'').localeCompare(a.lastmod||''));

      render(items);

      q.addEventListener('input', () => {
        const s = q.value.toLowerCase().trim();
        const filtered = items.filter(x => x.title.toLowerCase().includes(s));
        render(filtered);
      });

      function render(arr){
        listEl.innerHTML = '';
        arr.forEach(it => listEl.appendChild(card(it)));
        countEl.textContent = arr.length;
      }
    })
    .catch(() => {
      listEl.innerHTML = '<p class="meta">Nie udało się wczytać listy z sitemap.xml</p>';
    });
})();
</script>
</body>
</html>
